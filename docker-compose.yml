services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      SERVICE_NAME: ${SERVICE_NAME}
      HTTP_PORT: ${HTTP_PORT}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      DATABASE_PING_TIMEOUT: ${DATABASE_PING_TIMEOUT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE_PATH: /var/log/paris-api/paris-api.jsonl
      MIGRATIONS_PATH: /app/internal/infrastructure/db/migrations
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      LOCAL_TRANSACTION_FILE_PATH: ${LOCAL_TRANSACTION_FILE_PATH}
      AZURE_BLOB_CONNECTION_STRING: ${AZURE_BLOB_CONNECTION_STRING}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_VERSION: ${OPENAI_API_VERSION}
      OPENAI_USE_AZURE: ${OPENAI_USE_AZURE}
      REACT_CLASSIFICATION_MODEL: ${REACT_CLASSIFICATION_MODEL}
      REACT_CLASSIFICATION_FLUSH_TIMEOUT: ${REACT_CLASSIFICATION_FLUSH_TIMEOUT}
      REACT_CLASSIFICATION_CLASSIFIER_FAMILY: ${REACT_CLASSIFICATION_CLASSIFIER_FAMILY}
      REACT_CLASSIFICATION_CLASSIFIER_VERSION: ${REACT_CLASSIFICATION_CLASSIFIER_VERSION}
      REACT_CLASSIFICATION_REQUEST_TIMEOUT: ${REACT_CLASSIFICATION_REQUEST_TIMEOUT}
      REACT_CLASSIFICATION_BATCH_SIZE: ${REACT_CLASSIFICATION_BATCH_SIZE}
    ports:
      - "9000:9000"
    volumes:
      - api_logs:/var/log/paris-api

volumes:
  postgres_data:
  api_logs:
