name: Sync Meta Repo

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]

concurrency:
  group: sync-meta-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  sync_meta:
    name: Sync Meta Repo
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Check for prior successful sync
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          UPSTREAM_SHA: ${{ github.event.workflow_run.head_sha }}
          UPSTREAM_BRANCH: ${{ github.event.workflow_run.head_branch }}
        shell: bash
        run: |
          if [ "$RUN_ATTEMPT" != "1" ]; then
            for attempt in $(seq 1 $((RUN_ATTEMPT - 1))); do
              response=$(curl -fsSL \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/attempts/$attempt/jobs")

              prior_sync=$(printf '%s' "$response" | jq -r '.jobs[] | select(.name == "Sync Meta Repo") | .conclusion' | head -n 1)
              if [ "$prior_sync" = "success" ]; then
                echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
                echo "skip_reason=already_succeeded_on_attempt" >> "$GITHUB_OUTPUT"
                echo "prior_attempt=$attempt" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
          fi

          response=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/workflows/sync-meta.yaml/runs?event=workflow_run&branch=$UPSTREAM_BRANCH&status=completed&per_page=100")

          prior_run_id=$(printf '%s' "$response" | jq -r \
            --arg run_id "$RUN_ID" \
            --arg sha "$UPSTREAM_SHA" \
            '.workflow_runs[]
            | select((.id | tostring) != $run_id and .head_sha == $sha and .conclusion == "success")
            | .id' | head -n 1)

          if [ -n "$prior_run_id" ]; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=already_succeeded_for_sha" >> "$GITHUB_OUTPUT"
            echo "prior_run_id=$prior_run_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_dispatch=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch meta repo sync
        if: ${{ steps.dedupe.outputs.should_dispatch == 'true' }}
        env:
          META_REPO_DISPATCH_TOKEN: ${{ secrets.META_REPO_DISPATCH_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPOSITORY: ${{ github.event.workflow_run.repository.full_name }}
        shell: bash
        run: |
          payload=$(jq -n \
            --arg event_type "submodule-updated" \
            --arg submodule "api" \
            --arg branch "$BRANCH" \
            --arg sha "$SHA" \
            --arg repository "$REPOSITORY" \
            '{event_type: $event_type, client_payload: {submodule: $submodule, branch: $branch, sha: $sha, repository: $repository}}')

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $META_REPO_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gyud-adb/paris/dispatches \
            -d "$payload"

      - name: Skip duplicate sync
        if: ${{ steps.dedupe.outputs.should_dispatch != 'true' }}
        run: |
          case "${{ steps.dedupe.outputs.skip_reason }}" in
            already_succeeded_on_attempt)
              echo "sync_meta already succeeded on attempt ${{ steps.dedupe.outputs.prior_attempt }}"
              ;;
            already_succeeded_for_sha)
              echo "sync_meta already succeeded in workflow run ${{ steps.dedupe.outputs.prior_run_id }} for this SHA"
              ;;
            *)
              echo "sync_meta dispatch skipped"
              ;;
          esac